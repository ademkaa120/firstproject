{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>register the account</title>
    <link rel="stylesheet" href="{% static 'todo/login.css' %}">
</head>
<body class="login-page">
    <div class="login-card">
        <div class="login-header">
            <h2 class="login-title">Create Account</h2>
            <p class="login-subtitle">Join TaskFlow Pro</p>
        </div>

        <form method="POST" action="" class="login-form">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password1" placeholder="Enter your password" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="password2" placeholder="Confirm your password" required>
            </div>
            <button type="submit" class="login-btn">Create Account</button>
        </form>
        <p>Already have an account? <a href="{% url 'login' %}">Login here</a></p>
    </div>
</body>
</html>
